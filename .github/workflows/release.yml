name: "Release"

on:
  push:
    branches: [main]
    paths:
      - '.sampo/changesets/**'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency control: only one release process can run at a time
# This prevents race conditions if multiple PRs with 'release' label merge simultaneously
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-release: ${{ steps.resolve.outputs.should-release }}
      bump-type: ${{ steps.resolve.outputs.bump-type }}
    steps:
      - name: Resolve release request
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          CURRENT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: main
          PUSH_SHA: ${{ github.sha }}
          PUSH_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          SHOULD_RELEASE=false
          BUMP_TYPE=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$CURRENT_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
              echo "::notice::Skipping release because workflow_dispatch must be run on $DEFAULT_BRANCH, got $CURRENT_REF."
            else
              SHOULD_RELEASE=true
              echo "✓ Manual release requested on $DEFAULT_BRANCH"
            fi

            echo "should-release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
            echo "bump-type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${PUSH_HEAD_COMMIT_MESSAGE:-}" == *"[version bump]"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "Bump version to "* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: Release v"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: release "* ]]; then
            echo "::notice::Skipping release for the automated version bump commit."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "bump-type=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PRS_JSON=$(gh api "repos/${{ github.repository }}/commits/$PUSH_SHA/pulls")
          MATCHING_PR_COUNT=$(echo "$PRS_JSON" | jq --arg branch "$DEFAULT_BRANCH" '[.[] | select(.merged_at != null and .base.ref == $branch and (.labels | map(.name) | index("release")))] | length')

          if [ "$MATCHING_PR_COUNT" -eq 0 ]; then
            ASSOCIATED_PRS=$(echo "$PRS_JSON" | jq -r '[.[].number | tostring] | join(", ")')
            if [ -n "$ASSOCIATED_PRS" ]; then
              echo "::notice::Skipping release because push $PUSH_SHA is associated with PR(s) [$ASSOCIATED_PRS], but none currently have the release label."
            else
              echo "::notice::Skipping release because push $PUSH_SHA is not associated with a merged PR to $DEFAULT_BRANCH that has the release label."
            fi
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "bump-type=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_PRS=$(echo "$PRS_JSON" | jq -r --arg branch "$DEFAULT_BRANCH" '[.[] | select(.merged_at != null and .base.ref == $branch and (.labels | map(.name) | index("release"))) | "#\(.number)"] | join(", ")')
          echo "✓ Release requested by push $PUSH_SHA via $RELEASE_PRS"
          echo "should-release=true" >> "$GITHUB_OUTPUT"
          echo "bump-type=" >> "$GITHUB_OUTPUT"

  check-release-label:
    name: Check for release label
    needs: resolve-release-context
    runs-on: ubuntu-latest
    # Run when PR with 'release' label is merged to main
    if: needs.resolve-release-context.outputs.should-release == 'true'
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check release conditions
        id: check
        run: |
          changeset_count=$(find .sampo/changesets -name '*.md' 2>/dev/null | wc -l)
          if [ "$changeset_count" -gt 0 ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "Found $changeset_count changeset(s), ready to release"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to release"
          fi

  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: check-release-label
    if: needs.check-release-label.outputs.should-release == 'true'
    uses: posthog/.github/.github/workflows/notify-approval-needed.yml@main
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Release and publish
    needs: [resolve-release-context, check-release-label, notify-approval-needed]
    runs-on: ubuntu-latest
    # Use `always()` to ensure the job runs even if notify-approval-needed is skipped,
    # but still depend on it to access `needs.notify-approval-needed.outputs.slack_ts`
    if: always() && needs.resolve-release-context.outputs.should-release == 'true' && needs.check-release-label.outputs.should-release == 'true'
    environment: "Release" # This will require an approval from a maintainer, they are notified in Slack above
    permissions:
      contents: write
      actions: write
      id-token: write
    steps:
      - name: Notify Slack - Approved
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Version bump in progress..."
          emoji_reaction: "white_check_mark"

      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_POSTHOG_PYTHON_RELEASER_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_PYTHON_RELEASER_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.releaser.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11.11

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          pyproject-file: "pyproject.toml"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@0b1efabc08b657293548b77fb76cc02d26091c7e
        with:
          toolchain: 1.91.1
          components: cargo

      - name: Cache Sampo CLI
        id: cache-sampo
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/sampo
          key: sampo-${{ runner.os }}-${{ runner.arch }}

      - name: Install Sampo CLI
        if: steps.cache-sampo.outputs.cache-hit != 'true'
        run: cargo install sampo

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Prepare release with Sampo
        id: sampo-release
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}
        run: |
          sampo release
          new_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Sync version to posthog/version.py
        env:
          NEW_VERSION: ${{ steps.sampo-release.outputs.new_version }}
        run: |
          echo "VERSION = \"$NEW_VERSION\"" > posthog/version.py

      - name: Commit release changes
        id: commit-release
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: "chore: Release v${{ steps.sampo-release.outputs.new_version }}"
          repo: ${{ github.repository }}
          branch: main
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      # Publishing is done manually (not via `sampo publish`) because we need to
      # publish both `posthog` and `posthoganalytics` packages to PyPI.
      # Sampo only knows about the `posthog` package, so we handle both here.
      # Both packages use PyPI OIDC trusted publishing (no API tokens needed).
      - name: Build posthog
        if: steps.commit-release.outputs.commit-hash != ''
        run: uv run make build_release

      - name: Publish posthog to PyPI
        if: steps.commit-release.outputs.commit-hash != ''
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      # The `posthoganalytics` package is a mirror of `posthog` published under
      # a different name for backwards compatibility. The make target handles
      # copying, renaming imports, and building the dist automatically.
      - name: Build posthoganalytics
        if: steps.commit-release.outputs.commit-hash != ''
        run: uv run make build_release_analytics

      - name: Publish posthoganalytics to PyPI
        if: steps.commit-release.outputs.commit-hash != ''
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      # We skip `sampo publish` (which normally creates the tag) because we
      # need to publish both posthog and posthoganalytics manually, so we
      # create the tag ourselves.
      - name: Tag release
        if: steps.commit-release.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ steps.sampo-release.outputs.new_version }}
          COMMIT_HASH: ${{ steps.commit-release.outputs.commit-hash }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f "ref=refs/tags/${NEW_VERSION}" \
            -f "sha=${COMMIT_HASH}"

      - name: Create GitHub Release
        if: steps.commit-release.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ steps.sampo-release.outputs.new_version }}
        run: gh release create "$NEW_VERSION" --generate-notes

      - name: Dispatch generate-references
        if: steps.commit-release.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run generate-references.yml --ref main

      # Notify in case of a failure
      - name: Send failure event to PostHog
        if: ${{ failure() }}
        uses: PostHog/posthog-github-action@v1
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-python-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "version": "${{ steps.sampo-release.outputs.new_version }}"
            }

      - name: Notify Slack - Failed
        if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Failed to release `posthog-python@${{ steps.sampo-release.outputs.new_version }}`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

  notify-released:
    name: Notify Slack - Released
    needs: [check-release-label, notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Notify Slack - Released
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 posthog-python released successfully!"
          emoji_reaction: "rocket"
