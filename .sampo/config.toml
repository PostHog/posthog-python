# Sampo configuration
version = 1

[git]
default_branch = "main"
# No short_tags: every published package is tagged with its name prefix
# (posthog-v1.2.3, openfeature-provider-posthog-v0.1.0), matching the multi-package
# convention used by other PostHog SDKs (e.g. posthog-ruby).

[github]
repository = "posthog/posthog-python"

[changelog]
# Options for release notes generation.
# show_commit_hash = true (default)
# show_acknowledgments = true (default)

[packages]
# Options for package discovery and filtering.
# ignore_unpublished = false (default)
# ignore = ["internal-*", "examples/*"]
